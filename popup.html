<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      padding: 14px 16px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, #0071e3, #5ac8fa);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: white;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }

    .content {
      padding: 16px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 10px;
      color: #8e8ea0;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field input {
      width: 100%;
      padding: 9px 12px;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
    }

    .field input:focus {
      border-color: #0071e3;
    }

    .field input::placeholder {
      color: #4a4a6a;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #2a2a4a;
      border-radius: 22px;
      transition: 0.3s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle input:checked + .slider {
      background: #0071e3;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: linear-gradient(135deg, #0071e3, #0077ed);
      color: white;
    }

    .btn-danger {
      background: transparent;
      border: 1px solid #ff4757;
      color: #ff4757;
    }

    .toast {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%) translateY(50px);
      background: #30d158;
      color: white;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      transition: transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: #ff4757;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">A</span>
    <h1>ASC AutoFill</h1>
  </div>

  <div class="content">
    <div class="field">
      <label>Apple ID</label>
      <input type="email" id="appleId" placeholder="example@icloud.com">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="パスワードを入力">
    </div>

    <div class="toggle-row">
      <span>自動入力を有効にする</span>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="save">保存</button>
      <button class="btn btn-danger" id="clear">削除</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
